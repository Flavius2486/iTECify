$kind: http-request
name: Send Message
method: POST
url: '{{baseUrl}}/api/messages/:userId'
order: 3000
description: 'Send a message in a conversation. Supports optional `content` (text) and `codeSnippet` fields. Returns the created message object (201).'
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: userId
    value: abc-123
body:
  type: json
  content: |-
    {
      "content": "Hello!",
      "codeSnippet": null
    }
