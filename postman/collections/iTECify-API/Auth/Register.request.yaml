$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/register'
order: 1000
description: Register a new user. Returns a JWT token and user object on success (201). Returns 409 if email or username already exists.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "username": "myusername",
      "password": "mypassword"
    }
