$kind: http-request
name: Update Code Snippet
method: PUT
url: '{{baseUrl}}/api/code/:codeId'
order: 2000
description: 'Updates an existing code snippet. Requires code in the body. Returns success message.'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
pathVariables:
  - key: codeId
    value: some-code-id
body:
  type: json
  content: |-
    {
      "code": "console.log('updated');",
      "name": "javascript"
    }
