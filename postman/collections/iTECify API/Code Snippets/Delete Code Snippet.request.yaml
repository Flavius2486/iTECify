$kind: http-request
name: Delete Code Snippet
method: DELETE
url: '{{baseUrl}}/api/code/{{codeId}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", () => {
        pm.expect([200, 404]).to.include(pm.response.code);
      });
      pm.test("Response is an object", () => {
        pm.expect(pm.response.json()).to.be.an('object');
      });
