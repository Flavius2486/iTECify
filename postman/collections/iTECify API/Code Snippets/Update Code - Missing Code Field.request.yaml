$kind: http-request
name: 'Update Code - Missing Code Field'
method: PUT
url: '{{baseUrl}}/api/code/{{codeId}}'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400 for missing code", () => pm.response.to.have.status(400));
      pm.test("Returns error message", () => {
        pm.expect(pm.response.json().message).to.equal('code is required');
      });
