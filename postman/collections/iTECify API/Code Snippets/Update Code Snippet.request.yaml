$kind: http-request
name: Update Code Snippet
method: PUT
url: '{{baseUrl}}/api/code/{{codeId}}'
order: 2000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "code": "console.log('Updated!');",
      "name": "javascript"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", () => {
        pm.expect([200, 404]).to.include(pm.response.code);
      });
      pm.test("Response is an object", () => {
        pm.expect(pm.response.json()).to.be.an('object');
      });
