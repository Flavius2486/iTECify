$kind: http-request
name: Send Message
method: POST
url: '{{baseUrl}}/api/messages/{{otherUserId}}'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "content": "Hello from Postman test!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      pm.test("Returns messageId", () => {
        pm.expect(pm.response.json()).to.have.property('messageId');
      });
      const json = pm.response.json();
      if (json.messageId) {
        pm.environment.set('messageId', json.messageId);
      }
