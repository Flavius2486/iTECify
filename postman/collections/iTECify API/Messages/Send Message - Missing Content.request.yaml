$kind: http-request
name: 'Send Message - Missing Content'
method: POST
url: '{{baseUrl}}/api/messages/{{otherUserId}}'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400 for missing content", () => pm.response.to.have.status(400));
      pm.test("Returns error message", () => {
        pm.expect(pm.response.json().message).to.equal('Message content is required');
      });
