$kind: http-request
name: 'Login - Missing Fields'
method: POST
url: '{{baseUrl}}/api/login'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "identifier": "testuser@example.com"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400 for missing fields", () => pm.response.to.have.status(400));
      pm.test("Returns missing fields message", () => {
        pm.expect(pm.response.json().message).to.equal('Missing fields');
      });
